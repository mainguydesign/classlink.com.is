<!DOCTYPE html>
<html>
<head>
<title>History Project OS v3</title>

<link id="favicon" rel="icon">

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
cursor:default;
}

/* LOGIN */
#login,#locked{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#000;
}

#locked{background:#300;display:none;}
#desktop{display:none;}

/* ICONS */
.icon{
width:120px;
padding:10px;
background:#222;
margin:10px;
display:inline-block;
cursor:pointer;
border-radius:8px;
text-align:center;
}

/* WINDOWS */
.window{
position:absolute;
top:100px;
left:100px;
width:500px;
height:350px;
background:#222;
border:1px solid #444;
display:none;
resize:both;
overflow:hidden;
}

.header{
background:#333;
padding:5px;
cursor:move;
user-select:none;
}

.close{
float:right;
color:red;
cursor:pointer;
}

iframe{
width:100%;
height:260px;
border:none;
background:white;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:#000;
display:flex;
gap:5px;
padding:5px;
}

/* GAME LIST */
.game{
padding:6px;
cursor:pointer;
}
.game:hover{background:#444;}

button,input{margin:3px;}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
<input id="pass" placeholder="password">
<div id="msg"></div>
</div>

<!-- 🔒 LOCK -->
<div id="locked"></div>

<!-- 🖥️ DESKTOP -->
<div id="desktop">

<div class="icon" onclick="openWin('browser')">🌐 Browser</div>
<div class="icon" onclick="openWin('games')">🎮 Games</div>
<div class="icon" onclick="openWin('settings')">⚙️ Settings</div>
<div class="icon" onclick="openWin('ai')">🤖 AI</div>

</div>

<div id="taskbar"></div>

<!-- 🌐 BROWSER -->
<div class="window" id="browser">
<div class="header">Browser <span class="close" onclick="closeWin('browser')">X</span></div>

<input id="url" placeholder="https://">
<button onclick="go()">Go</button>
<iframe id="frame"></iframe>
</div>

<!-- 🎮 GAMES -->
<div class="window" id="games">
<div class="header">Games <span class="close" onclick="closeWin('games')">X</span></div>

<div class="game" onclick="openSite('https://classic.minecraft.net')">Minecraft</div>
<div class="game" onclick="openSite('https://tetris.com/play-tetris')">Tetris</div>
<div class="game" onclick="openSite('https://quickdraw.withgoogle.com')">Quick Draw</div>
<div class="game" onclick="openSite('https://sites.google.com/view/classroom6x/')">Classroom 6x</div>

</div>

<!-- ⚙️ SETTINGS -->
<div class="window" id="settings">
<div class="header">Settings <span class="close" onclick="closeWin('settings')">X</span></div>

<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('light')">Light</button>
</div>

<!-- 🤖 AI -->
<div class="window" id="ai">
<div class="header">AI <span class="close" onclick="closeWin('ai')">X</span></div>

<div id="chat"></div>
<input id="input">
<button onclick="send()">Send</button>
</div>

<script>

/* ================= LOGIN ================= */

const PASSWORD = "superiorsiteowner";
const RECOVERY = "recover123";

let attempts = 0;
let lockUntil = 0;
let lockTimer;

const login = document.getElementById("login");
const locked = document.getElementById("locked");
const desktop = document.getElementById("desktop");
const pass = document.getElementById("pass");
const msg = document.getElementById("msg");

pass.onkeydown = e=>{
if(e.key!=="Enter")return;

if(Date.now()<lockUntil){
showLock();return;
}

if(pass.value===PASSWORD){
login.style.display="none";
desktop.style.display="block";
localStorage.setItem("ok","1");
}else{
attempts++;
msg.innerText="Wrong "+attempts+"/3";
if(attempts>=3)lock();
}
};

if(localStorage.getItem("ok")==="1"){
login.style.display="none";
desktop.style.display="block";
}

/* LOCK */
function lock(){
lockUntil=Date.now()+15000;
showLock();

clearInterval(lockTimer);
lockTimer=setInterval(()=>{
let left=Math.max(0,lockUntil-Date.now());

locked.innerHTML=`
<h2>LOCKED</h2>
<p>${Math.ceil(left/1000)}s</p>
<input id="rec">
<button onclick="rec()">recover</button>
<p id="m"></p>
`;

if(left<=0){
clearInterval(lockTimer);
locked.style.display="none";
login.style.display="flex";
attempts=0;
}
},500);
}

function showLock(){
login.style.display="none";
locked.style.display="flex";
}

function rec(){
let v=document.getElementById("rec").value;
if(v===RECOVERY){
locked.style.display="none";
login.style.display="flex";
attempts=0;
lockUntil=0;
}else{
document.getElementById("m").innerText="wrong";
}
}

/* ================= WINDOWS ================= */

let z=10;

function openWin(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.zIndex=++z;

let b=document.createElement("button");
b.innerText=id;
b.onclick=()=>openWin(id);
taskbar.appendChild(b);
}

function closeWin(id){
document.getElementById(id).style.display="none";
}

/* BROWSER */
function go(){
frame.src=url.value;
}

function openSite(u){
openWin("browser");
frame.src=u;
}

/* THEME */
function theme(t){
document.body.style.background=
t==="dark"?"#111":
t==="blue"?"#0a1a3a":"#eee";

document.body.style.color=t==="light"?"black":"white";
}

/* AI */
function send(){
chat.innerHTML+="You: "+input.value+"<br>";
chat.innerHTML+="AI: offline demo<br>";
input.value="";
}

/* FAVICON */
favicon.href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='20'>🖥️</text></svg>";

</script>

</body>
</html>
