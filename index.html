<!DOCTYPE html>
<html>
<head>
<title>History Project</title>

<link id="dynamic-favicon" rel="icon" href="">

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
cursor:default;
}

/* LOGIN */
#login,#locked{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}
#login{background:black;}
#locked{background:darkred;display:none;}

/* DESKTOP */
#desktop{display:none;height:100vh;padding:20px;}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:#000;
display:flex;
align-items:center;
gap:5px;
}

/* ICONS */
.icon{
display:inline-block;
margin:10px;
cursor:pointer;
position:relative;
}

/* WINDOW */
.window{
position:absolute;
top:120px;
left:120px;
width:500px;
height:350px;
background:#222;
display:none;
border:1px solid #444;
overflow:hidden;
resize:both;
}

/* HEADER */
.header{
background:#333;
padding:5px;
cursor:grab;
}

/* CLOSE */
.close{
float:right;
color:red;
cursor:pointer;
}

/* IFRAME */
iframe{
width:100%;
height:calc(100% - 70px);
border:none;
}

/* PIN */
.pin-dot{
width:10px;
height:10px;
background:purple;
position:absolute;
top:0;
right:0;
display:none;
}

/* PIN MENU */
#pinMenu{
position:absolute;
background:#222;
padding:5px;
display:none;
}

/* CHAT */
#chatBox{
height:250px;
overflow:auto;
padding:5px;
background:#111;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="pass" placeholder="password">
<div id="msg"></div>
</div>

<!-- LOCK -->
<div id="locked">
<h2>LOCKED</h2>
<div id="timer"></div>
<input id="recovery" placeholder="recovery">
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" data-app="browser" onclick="openApp('browser')" onmouseenter="hoverApp(event,this)">
🌐 Browser<div class="pin-dot"></div>
</div>

<div class="icon" data-app="games" onclick="openApp('games')" onmouseenter="hoverApp(event,this)">
🎮 Games<div class="pin-dot"></div>
</div>

<div class="icon" data-app="settings" onclick="openApp('settings')" onmouseenter="hoverApp(event,this)">
⚙️ Settings<div class="pin-dot"></div>
</div>

<div class="icon" data-app="assistant" onclick="openApp('assistant')" onmouseenter="hoverApp(event,this)">
🤖 AI<div class="pin-dot"></div>
</div>

</div>

<!-- TASKBAR -->
<div id="taskbar"></div>

<!-- BROWSER -->
<div class="window" id="browser">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Browser <span class="close" onclick="closeApp('browser')">X</span>
</div>

<input id="url" placeholder="enter url">
<button onclick="go()">Go</button>

<iframe id="web"></iframe>
</div>

<!-- GAMES -->
<div class="window" id="games">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Games <span class="close" onclick="closeApp('games')">X</span>
</div>

<div onclick="openGame('https://classic.minecraft.net')">Minecraft</div>
<div onclick="openGame('https://quickdraw.withgoogle.com')">Quick Draw</div>
<div onclick="openGame('https://www.roblox.com')">Roblox (external)</div>

</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Settings <span class="close" onclick="closeApp('settings')">X</span>
</div>

<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('red')">Red</button>

</div>

<!-- AI ASSISTANT -->
<div class="window" id="assistant">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
AI Assistant <span class="close" onclick="closeApp('assistant')">X</span>
</div>

<div id="chatBox"></div>
<input id="chatInput" placeholder="Ask...">
<button onclick="sendMsg()">Send</button>
</div>

<!-- PIN MENU -->
<div id="pinMenu">
Pin app?<br>
<button onclick="pin(true)">Yes</button>
<button onclick="pin(false)">No</button>
</div>

<script>

/* PASSWORD */
const correct="superiorsiteowner";
const recovery="superiorlakeemerald";
let attempts=0;
let lockUntil=0;

pass.onkeydown=e=>{
if(e.key==="Enter"){
if(Date.now()<lockUntil)return lock();

if(pass.value===correct){
login.style.display="none";
desktop.style.display="block";
setFavicon("white");
}else{
attempts++;
msg.textContent="Wrong";

setFavicon("yellow");

if(attempts>=5){
lockUntil=Date.now()+600000;
lock();
}
}
pass.value="";
}
};

function lock(){
login.style.display="none";
locked.style.display="flex";
setFavicon("red");

function tick(){
let r=lockUntil-Date.now();
if(r>0){
timer.textContent=Math.ceil(r/1000)+"s";
setTimeout(tick,1000);
}else{
locked.style.display="none";
login.style.display="flex";
attempts=0;
setFavicon("white");
}
}
tick();
}

recovery.onkeydown=e=>{
if(e.key==="Enter" && recovery.value===recovery){
lockUntil=0;
locked.style.display="none";
login.style.display="flex";
setFavicon("white");
}
};

/* WINDOWS */
let z=10;
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.zIndex=++z;
addTask(id);
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

/* TASKBAR */
function addTask(id){
if([...taskbar.children].find(b=>b.textContent===id))return;

let b=document.createElement("button");
b.textContent=id;
b.onclick=()=>openApp(id);
taskbar.appendChild(b);
}

/* DRAG */
let drag=null,ox,oy;
function dragStart(e,el){
drag=el;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
}

document.onmousemove=e=>{
if(drag){
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
}
};
document.onmouseup=()=>drag=null;

/* BROWSER */
function go(){
web.src=url.value.startsWith("http")?url.value:"https://"+url.value;
}

function openGame(u){
openApp("browser");
web.src=u;
}

/* THEME */
function theme(t){
document.body.style.background =
t==="dark"?"#111":
t==="blue"?"#0a1a3a":"#3a0a0a";
}

/* AI */
function sendMsg(){
let v=chatInput.value;
chatBox.innerHTML+="<div>You: "+v+"</div>";

let r="I’m a simple assistant.";
if(v.includes("game"))r="Open Games app.";
if(v.includes("hello"))r="Hello.";

setTimeout(()=>{
chatBox.innerHTML+="<div>AI: "+r+"</div>";
},300);

chatInput.value="";
}

/* PIN */
let last={},current=null;
function hoverApp(e,el){
let app=el.dataset.app;
let now=Date.now();

if(last[app] && now-last[app]<10000)return;

current=app;
last[app]=now;

pinMenu.style.display="block";
pinMenu.style.left=e.pageX+"px";
pinMenu.style.top=e.pageY+"px";

setTimeout(()=>pinMenu.style.display="none",2000);
}

function pin(v){
document.querySelector(`[data-app="${current}"] .pin-dot`).style.display=v?"block":"none";
pinMenu.style.display="none";
}

/* FAVICON */
function setFavicon(c){
let svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>
<path fill='${c}' d='M2 12l19-9-7 19-2-8-10-2z'/>
</svg>`;
document.getElementById("dynamic-favicon").href =
"data:image/svg+xml,"+encodeURIComponent(svg);
}

setFavicon("white");

</script>

</body>
</html>
