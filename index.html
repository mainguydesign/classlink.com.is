<!DOCTYPE html>
<html>
<head>
<title>History Project</title>
<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/3/3c/Paper_plane.svg">

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
cursor:url("https://upload.wikimedia.org/wikipedia/commons/3/3c/Paper_plane.svg"),auto;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
}

/* LOCK */
#locked{
display:none;
position:fixed;
width:100%;
height:100%;
background:darkred;
color:white;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* DESKTOP */
#desktop{
display:none;
padding:20px;
}

/* ICON */
.icon{
display:inline-block;
margin:10px;
cursor:pointer;
position:relative;
}

/* WINDOWS */
.window{
position:absolute;
top:120px;
left:120px;
width:500px;
height:350px;
background:#222;
border:1px solid #555;
display:none;
resize:both;
overflow:hidden;
}

/* HEADER */
.header{
background:#333;
padding:5px;
cursor:grab;
}

/* CLOSE BUTTON */
.close{
float:right;
cursor:pointer;
color:red;
}

/* GAME LIST */
#gameList div{
padding:5px;
cursor:pointer;
color:lightblue;
}

/* IFRAME */
iframe{
width:100%;
height:calc(100% - 30px);
border:none;
}

/* PIN */
.pin-dot{
width:10px;
height:10px;
background:purple;
position:absolute;
top:0;
right:0;
display:none;
}

/* PIN MENU */
#pinMenu{
position:absolute;
background:#222;
padding:5px;
display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="pass" placeholder="password">
<div id="msg"></div>
</div>

<!-- LOCK -->
<div id="locked">
<h2>ACCESS DENIED</h2>
<div id="timer"></div>
<input id="recovery" placeholder="recovery">
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" data-app="games" onclick="openApp('games')" onmouseenter="hoverApp(event,this)">
🎮 Games
<div class="pin-dot"></div>
</div>

<div class="icon" data-app="settings" onclick="openApp('settings')" onmouseenter="hoverApp(event,this)">
⚙️ Settings
<div class="pin-dot"></div>
</div>

</div>

<!-- GAME HUB -->
<div class="window" id="games">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Games <span class="close" onclick="closeApp('games')">X</span>
</div>
<div id="gameList"></div>
</div>

<!-- GAME VIEWER -->
<div class="window" id="viewer">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Game <span class="close" onclick="closeApp('viewer')">X</span>
</div>
<iframe id="frame"></iframe>
</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Settings <span class="close" onclick="closeApp('settings')">X</span>
</div>

<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('red')">Red</button>
</div>

<!-- PIN MENU -->
<div id="pinMenu">
Pin app?
<br>
<button onclick="pin(true)">Yes</button>
<button onclick="pin(false)">No</button>
</div>

<script>

/* PASSWORD */
const correct="superiorsiteowner";
const recoveryPass="superiorlakeemerald";
let attempts=0;
let lockUntil=0;

pass.addEventListener("keydown",e=>{
if(e.key==="Enter"){

if(Date.now()<lockUntil)return lock();

if(pass.value===correct){
login.style.display="none";
desktop.style.display="block";
renderGames();
}else{
attempts++;
msg.textContent="Wrong ("+attempts+"/5)";
if(attempts>=5){
lockUntil=Date.now()+600000;
lock();
}
}
pass.value="";
}
});

/* LOCK */
function lock(){
login.style.display="none";
locked.style.display="flex";

function tick(){
let t=lockUntil-Date.now();
if(t>0){
timer.textContent=Math.ceil(t/1000)+"s";
setTimeout(tick,1000);
}else{
locked.style.display="none";
login.style.display="flex";
attempts=0;
}
}
tick();
}

/* RECOVERY */
recovery.addEventListener("keydown",e=>{
if(e.key==="Enter" && recovery.value===recoveryPass){
lockUntil=0;
locked.style.display="none";
login.style.display="flex";
}
});

/* WINDOWS */
let z=10;
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.zIndex=++z;
}
function closeApp(id){
document.getElementById(id).style.display="none";
}

/* DRAG */
let drag=null,ox,oy;
function dragStart(e,el){
drag=el;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
el.style.zIndex=++z;
}
document.addEventListener("mousemove",e=>{
if(drag){
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
}
});
document.addEventListener("mouseup",()=>drag=null);

/* GAMES → OPEN IN IFRAME */
const games=[
{name:"Minecraft Classic",url:"https://classic.minecraft.net"},
{name:"Google Quick Draw",url:"https://quickdraw.withgoogle.com"},
{name:"2048",url:"https://specials.manoramaonline.com/Mobile/2022/2048-game/index.html"}
];

function renderGames(){
gameList.innerHTML="";
games.forEach(g=>{
let div=document.createElement("div");
div.textContent=g.name;
div.onclick=()=>{
frame.src=g.url;
openApp("viewer");
};
gameList.appendChild(div);
});
}

/* THEMES */
function theme(t){
if(t==="dark")document.body.style.background="#111";
if(t==="blue")document.body.style.background="#0a1a3a";
if(t==="red")document.body.style.background="#3a0a0a";
}

/* PIN SYSTEM */
let lastHover={},current=null;

function hoverApp(e,el){
let app=el.dataset.app;
let now=Date.now();

if(!lastHover[app]||now-lastHover[app]>10000){
current=app;
pinMenu.style.display="block";
pinMenu.style.left=e.pageX+"px";
pinMenu.style.top=e.pageY+"px";
lastHover[app]=now;
}
}

function pin(val){
let dot=document.querySelector(`[data-app="${current}"] .pin-dot`);
dot.style.display=val?"block":"none";
pinMenu.style.display="none";
}

document.addEventListener("click",()=>pinMenu.style.display="none");

</script>

</body>
</html>
