<!DOCTYPE html>
<html>
<head>
<title>History Project</title>

<link rel="icon" type="image/jpeg" href="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQ...">

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

/* DESKTOP */
#desktop{
display:none;
height:100vh;
padding:20px;
}

/* ICONS */
.icon{
width:90px;
display:inline-block;
text-align:center;
cursor:pointer;
margin:10px;
position:relative;
}

/* WINDOWS */
.window{
position:absolute;
top:120px;
left:120px;
width:420px;
background:#222;
border:1px solid #444;
display:none;
z-index:10;
}

.window-header{
background:#333;
padding:6px;
cursor:grab;
user-select:none;
}

.close{
float:right;
cursor:pointer;
}

/* GAME LIST */
#gameList a{
display:block;
padding:5px;
color:lightblue;
text-decoration:none;
}

/* PIN DOT */
.pin-dot{
position:absolute;
top:5px;
right:5px;
width:10px;
height:10px;
border-radius:50%;
background:purple;
display:none;
cursor:pointer;
}

/* PIN MENU */
.pin-menu{
position:absolute;
background:#222;
border:1px solid #555;
padding:6px;
font-size:12px;
display:none;
z-index:9999;
}

.pin-btn{
margin:2px;
padding:3px 6px;
cursor:pointer;
background:#333;
color:white;
border:none;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:#1a1a1a;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="pass" placeholder="password">
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" data-app="games" onclick="openApp('games')" onmouseenter="hoverApp(event,this)">
🎮 Games
<div class="pin-dot" onclick="togglePin(event,'games')"></div>
</div>

<div class="icon" data-app="settings" onclick="openApp('settings')" onmouseenter="hoverApp(event,this)">
⚙️ Settings
<div class="pin-dot" onclick="togglePin(event,'settings')"></div>
</div>

</div>

<!-- GAME HUB -->
<div class="window" id="games">
<div class="window-header" onmousedown="dragStart(event,this.parentElement)">
🎮 Game Hub <span class="close" onclick="closeApp('games')">X</span>
</div>

<div style="padding:10px;">
<input id="search" placeholder="search games..." style="width:100%">
<div id="gameList"></div>
</div>
</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<div class="window-header" onmousedown="dragStart(event,this.parentElement)">
⚙️ Settings <span class="close" onclick="closeApp('settings')">X</span>
</div>

<div style="padding:10px;">
<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('red')">Red</button>
</div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
<div>Start</div>
<div>History Project</div>
</div>

<!-- PIN MENU -->
<div id="pinMenu" class="pin-menu">
<div>Pin app?</div>
<button class="pin-btn" onclick="confirmPin(true)">Yes</button>
<button class="pin-btn" onclick="confirmPin(false)">No</button>
</div>

<script>

/* LOGIN */
document.getElementById("pass").addEventListener("keydown",e=>{
if(e.key==="Enter" && e.target.value==="superiorsiteowner"){
start();
}
});

function start(){
document.getElementById("login").style.display="none";
document.getElementById("desktop").style.display="block";

updatePins();
renderGames();
}

/* APPS */
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.zIndex=++z;
}
function closeApp(id){
document.getElementById(id).style.display="none";
}

/* GAME DATA */
const games=[
{name:"Minecraft",url:"#"},
{name:"Roblox",url:"#"},
{name:"Oregon Trail",url:"#"},
{name:"Terraria",url:"#"},
{name:"FNAF",url:"#"}
];

function renderGames(){
let box=document.getElementById("gameList");
let s=document.getElementById("search").value.toLowerCase();

box.innerHTML="";

games.filter(g=>g.name.toLowerCase().includes(s))
.forEach(g=>{
let a=document.createElement("a");
a.href=g.url;
a.target="_blank";
a.textContent=g.name;
box.appendChild(a);
});
}

/* SEARCH */
document.addEventListener("input",e=>{
if(e.target.id==="search")renderGames();
});

/* DRAG FIX */
let drag=null,ox=0,oy=0;

function dragStart(e,el){
drag=el;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
el.style.position="absolute";
el.style.zIndex=++z;
}

document.addEventListener("mousemove",e=>{
if(drag){
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
}
});
document.addEventListener("mouseup",()=>drag=null);

/* THEMES */
function theme(t){
if(t==="dark")document.body.style.background="#111";
if(t==="blue")document.body.style.background="#0a1a3a";
if(t==="red")document.body.style.background="#3a0a0a";
}

/* PIN SYSTEM */
let pinned=JSON.parse(localStorage.getItem("pinned"))||{};
let current=null;

/* 🔥 COOLDOWN SYSTEM (10s hover delay) */
let hoverCooldown={};

function hoverApp(e,el){
let app=el.dataset.app;
let now=Date.now();

if(!hoverCooldown[app] || now-hoverCooldown[app]>10000){
current=app;

let m=document.getElementById("pinMenu");
m.style.display="block";
m.style.left=e.pageX+"px";
m.style.top=e.pageY+"px";

hoverCooldown[app]=now;
}
}

function confirmPin(val){
if(!current)return;

pinned[current]=val;
localStorage.setItem("pinned",JSON.stringify(pinned));

updatePins();
document.getElementById("pinMenu").style.display="none";
}

function togglePin(e,app){
e.stopPropagation();
pinned[app]=!pinned[app];
localStorage.setItem("pinned",JSON.stringify(pinned));
updatePins();
}

/* UPDATE DOTS */
function updatePins(){
document.querySelectorAll(".icon").forEach(i=>{
let app=i.dataset.app;
let dot=i.querySelector(".pin-dot");
dot.style.display=pinned[app]?"block":"none";
});
}

/* CLOSE MENU */
document.addEventListener("click",()=>{
document.getElementById("pinMenu").style.display="none";
});

let z=10;

</script>

</body>
</html>
