<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal OS Fixed</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* SCREENS */
.screen {
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.show {
    display:flex;
}

#home { background:#111; }
#lockscreen { background:black; }
#lockedScreen { background:darkred; }
#overrideScreen { background:#c8facc; color:#0a3d1a; }

/* DESKTOP */
#desktop {
    display:none;
    height:100vh;
    padding:20px;
}

/* ICONS */
.icon {
    width:90px;
    text-align:center;
    cursor:pointer;
    display:inline-block;
}

/* WINDOWS */
.window {
    position:absolute;
    top:120px;
    left:120px;
    width:400px;
    background:#222;
    border:1px solid #555;
    display:none;
}

/* TASKBAR */
#taskbar {
    position:fixed;
    bottom:0;
    width:100%;
    height:40px;
    background:#1a1a1a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
}

/* GATE ANIMATION */
#gate {
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:none;
}

.gateHalf {
    position:absolute;
    width:50%;
    height:100%;
    background:black;
}

.left { left:0; }
.right { right:0; }

.open .left {
    animation: leftOpen 1s forwards;
}

.open .right {
    animation: rightOpen 1s forwards;
}

@keyframes leftOpen {
    to { transform:translateX(-100%); }
}

@keyframes rightOpen {
    to { transform:translateX(100%); }
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen show">
<h1>Welcome</h1>
<input id="homeSearch" placeholder="Press Enter">
</div>

<!-- LOGIN -->
<div id="lockscreen" class="screen">
<input id="password" placeholder="Password">
<div id="msg"></div>
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" onclick="openApp('games')">🎮 Games</div>
<div class="icon" onclick="openApp('settings')">⚙️ Settings</div>

</div>

<!-- GAME WINDOW -->
<div class="window" id="games">
<h3>Game Hub</h3>
<button onclick="closeApp('games')">Close</button>
</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<h3>Settings</h3>
<button onclick="setTheme('glass')">Glass</button>
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('red')">Red</button>
<button onclick="closeApp('settings')">Close</button>
</div>

<!-- TASKBAR -->
<div id="taskbar">
<div>Start</div>
<div>OS</div>
</div>

<!-- GATE -->
<div id="gate">
<div class="gateHalf left"></div>
<div class="gateHalf right"></div>
</div>

<script>

const correct="superiorsiteowner";
let attempts=0;

/* NAVIGATION FIXED */
document.getElementById("homeSearch").addEventListener("keydown",e=>{
if(e.key==="Enter"){
show("lockscreen");
}
});

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

/* LOGIN */
document.getElementById("password").addEventListener("keydown",e=>{
if(e.key==="Enter"){

if(e.target.value===correct){
startGate();
}else{
attempts++;
document.getElementById("msg").innerText="Wrong "+attempts;
}

e.target.value="";
}
});

/* GATE FIX */
function startGate(){

document.getElementById("lockscreen").classList.remove("show");

let gate=document.getElementById("gate");
gate.style.display="block";

setTimeout(()=>{
gate.classList.add("open");
},50);

setTimeout(()=>{
gate.style.display="none";
document.getElementById("desktop").style.display="block";
},1000);
}

/* APPS */
function openApp(id){
document.getElementById(id).style.display="block";
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

/* THEMES */
function setTheme(t){
document.body.className="";
if(t==="glass") document.body.style.background="linear-gradient(#111,#222)";
if(t==="dark") document.body.style.background="black";
if(t==="red") document.body.style.background="#3b0a0a";
}

</script>

</body>
</html>
