<!DOCTYPE html>
<html>
<head>
<title>History Project OS</title>

<!-- ⭐ FAVICON RESTORED -->
<link id="favicon" rel="icon" href="">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow:hidden;
}

/* LOGIN */
#login,#locked{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}
#login{background:black;}
#locked{background:darkred;display:none;}

/* DESKTOP */
#desktop{
display:none;
height:100vh;
padding:10px;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:40px;
background:#000;
display:flex;
align-items:center;
gap:5px;
padding:5px;
}

/* ICONS */
.icon{
width:100px;
padding:10px;
background:#222;
margin:5px;
display:inline-block;
cursor:pointer;
text-align:center;
border-radius:5px;
}

/* WINDOWS */
.window{
position:absolute;
top:120px;
left:120px;
width:520px;
height:360px;
background:#222;
display:none;
border:1px solid #444;
resize:both;
overflow:hidden;
}

.header{
background:#333;
padding:5px;
cursor:grab;
user-select:none;
}

.close{
float:right;
color:red;
cursor:pointer;
}

/* AI BOX */
#chatBox{
height:240px;
overflow:auto;
background:#111;
padding:5px;
}

/* INPUT */
input,button{margin:3px;}

iframe{
width:100%;
height:250px;
border:none;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="login">
<input id="pass" placeholder="Enter password">
<div id="msg"></div>
</div>

<!-- 🔴 LOCK SCREEN -->
<div id="locked">
<h2>LOCKED OUT</h2>
<input id="recovery" placeholder="recovery code">
</div>

<!-- 🖥️ DESKTOP -->
<div id="desktop">

<div class="icon" onclick="openApp('browser')">🌐 Browser</div>
<div class="icon" onclick="openApp('games')">🎮 Games</div>
<div class="icon" onclick="openApp('settings')">⚙️ Settings</div>
<div class="icon" onclick="openApp('ai')">🤖 AI</div>

</div>

<!-- TASKBAR -->
<div id="taskbar"></div>

<!-- 🌐 BROWSER -->
<div class="window" id="browser">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Browser <span class="close" onclick="closeApp('browser')">X</span>
</div>

<input id="url" placeholder="https://...">
<button onclick="go()">Go</button>

<iframe id="frame"></iframe>
</div>

<!-- 🎮 GAMES -->
<div class="window" id="games">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Games <span class="close" onclick="closeApp('games')">X</span>
</div>

<div onclick="openGame('https://classic.minecraft.net')">Minecraft</div>
<div onclick="openGame('https://quickdraw.withgoogle.com')">Quick Draw</div>
<div onclick="openGame('https://tetris.com/play-tetris')">Tetris</div>

</div>

<!-- ⚙️ SETTINGS -->
<div class="window" id="settings">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Settings <span class="close" onclick="closeApp('settings')">X</span>
</div>

<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('light')">Light</button>

</div>

<!-- 🤖 AI TAB (OFFLINE DEMO) -->
<div class="window" id="ai">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
AI Chat <span class="close" onclick="closeApp('ai')">X</span>
</div>

<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendAI()">Send</button>
</div>

<script>

/* ================= LOGIN SYSTEM ================= */

let attempts = 0;
const password = "admin123";
const recovery = "recover123";
const lockTime = 10000;
let lockedUntil = 0;

document.getElementById("pass").addEventListener("keydown",e=>{
if(e.key==="Enter"){
if(Date.now()<lockedUntil){
showLock();
return;
}

if(pass.value===password){
loginSuccess();
}else{
attempts++;
msg.innerText="Wrong ("+attempts+")";

if(attempts>=3){
lockedUntil=Date.now()+lockTime;
showLock();
}
}
}
});

function loginSuccess(){
login.style.display="none";
desktop.style.display="block";
}

function showLock(){
login.style.display="none";
locked.style.display="flex";
}

/* recovery */
recovery.addEventListener("keydown",e=>{
if(e.key==="Enter"){
if(recovery.value===recovery){
locked.style.display="none";
login.style.display="flex";
attempts=0;
}
}
});

/* ================= WINDOWS ================= */

let z=10,drag=null,ox,oy;

function openApp(id){
document.getElementById(id).style.display="block";
document.getElementById(id).style.zIndex=++z;
addTask(id);
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

/* TASKBAR */
function addTask(id){
if([...taskbar.children].find(b=>b.textContent===id))return;
let b=document.createElement("button");
b.textContent=id;
b.onclick=()=>openApp(id);
taskbar.appendChild(b);
}

/* DRAG FIX */
function dragStart(e,el){
drag=el;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
}

document.onmousemove=e=>{
if(drag){
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
}
};

document.onmouseup=()=>drag=null;

/* BROWSER */
function go(){
frame.src=url.value;
}

function openGame(u){
openApp("browser");
frame.src=u;
}

/* THEME */
function theme(t){
document.body.style.background=
t==="dark"?"#111":
t==="blue"?"#0a1a3a":"#eee";

document.body.style.color=(t==="light")?"black":"white";
}

/* AI (OFFLINE DEMO) */
function sendAI(){
chatBox.innerHTML+="<div>You: "+chatInput.value+"</div>";
chatBox.innerHTML+="<div>AI: This is a demo offline AI.</div>";
chatInput.value="";
}

/* FAVICON RESTORED */
function setFavicon(){
let svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='white' d='M2 12l19-9-7 19-2-8-10-2z'/></svg>`;
favicon.href="data:image/svg+xml,"+encodeURIComponent(svg);
}
setFavicon();

</script>

</body>
</html>
