<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini OS Fixed</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

/* DESKTOP */
#desktop{
display:none;
height:100vh;
padding:20px;
}

/* ICONS */
.icon{
width:90px;
display:inline-block;
text-align:center;
cursor:pointer;
margin:10px;
position:relative;
}

/* WINDOWS */
.window{
position:absolute;
top:120px;
left:120px;
width:420px;
background:#222;
border:1px solid #444;
display:none;
z-index:10;
}

.window-header{
background:#333;
padding:6px;
cursor:grab;
user-select:none;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:#1a1a1a;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
}

/* GAME LIST */
#gameList a{
display:block;
padding:5px;
color:lightblue;
text-decoration:none;
}

/* PIN DOT */
.pin-dot{
position:absolute;
top:5px;
right:5px;
width:10px;
height:10px;
border-radius:50%;
background:purple;
display:none;
cursor:pointer;
}

/* PIN MENU */
.pin-menu{
position:absolute;
background:#222;
border:1px solid #555;
padding:6px;
font-size:12px;
display:none;
z-index:9999;
}

.pin-btn{
margin:2px;
padding:3px 6px;
cursor:pointer;
background:#333;
color:white;
border:none;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="pass" placeholder="password">
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" data-app="games" onclick="openApp('games')" onmouseenter="showPinMenu(event,this)">
🎮 Games
<div class="pin-dot" onclick="togglePin(event,'games')"></div>
</div>

<div class="icon" data-app="settings" onclick="openApp('settings')" onmouseenter="showPinMenu(event,this)">
⚙️ Settings
<div class="pin-dot" onclick="togglePin(event,'settings')"></div>
</div>

</div>

<!-- GAME HUB -->
<div class="window" id="games">
<div class="window-header" onmousedown="startDrag(event,this.parentElement)">
🎮 Game Hub <span onclick="closeApp('games')" style="float:right;cursor:pointer;">X</span>
</div>

<div style="padding:10px;">
<input id="search" placeholder="search games..." style="width:100%;padding:5px;">
<div id="gameList" style="margin-top:10px;"></div>
</div>
</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<div class="window-header" onmousedown="startDrag(event,this.parentElement)">
⚙️ Settings <span onclick="closeApp('settings')" style="float:right;cursor:pointer;">X</span>
</div>

<div style="padding:10px;">
<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('red')">Red</button>
</div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
<div>Start</div>
<div>Mini OS</div>
</div>

<!-- PIN MENU -->
<div id="pinMenu" class="pin-menu">
<div>Pin app?</div>
<button class="pin-btn" onclick="confirmPin(true)">Yes</button>
<button class="pin-btn" onclick="confirmPin(false)">No</button>
</div>

<script>

/* LOGIN */
document.getElementById("pass").addEventListener("keydown",e=>{
if(e.key==="Enter" && e.target.value==="superiorsiteowner"){
start();
}
});

function start(){
document.getElementById("login").style.display="none";
document.getElementById("desktop").style.display="block";

updatePins();
renderGames();
}

/* APPS */
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";

/* FIX: always bring to front */
w.style.zIndex=++zIndex;
}
function closeApp(id){
document.getElementById(id).style.display="none";
}

/* GAME DATA */
const games=[
{name:"Minecraft",url:"#"},
{name:"Roblox",url:"#"},
{name:"Oregon Trail",url:"#"},
{name:"Terraria",url:"#"}
];

function renderGames(){
let box=document.getElementById("gameList");
let s=(document.getElementById("search")||{}).value?.toLowerCase()||"";

box.innerHTML="";

games
.filter(g=>g.name.toLowerCase().includes(s))
.forEach(g=>{
let a=document.createElement("a");
a.href=g.url;
a.target="_blank";
a.textContent=g.name;
box.appendChild(a);
});
}

/* SEARCH FIX */
document.addEventListener("input",e=>{
if(e.target.id==="search")renderGames();
});

/* DRAG FIX (IMPORTANT) */
let drag=null,offsetX=0,offsetY=0;

function startDrag(e,el){
drag=el;
offsetX=e.clientX-el.offsetLeft;
offsetY=e.clientY-el.offsetTop;
el.style.position="absolute";
el.style.zIndex=++zIndex;
}

document.addEventListener("mousemove",e=>{
if(drag){
drag.style.left=(e.clientX-offsetX)+"px";
drag.style.top=(e.clientY-offsetY)+"px";
}
});

document.addEventListener("mouseup",()=>drag=null);

/* THEMES */
function theme(t){
if(t==="dark")document.body.style.background="#111";
if(t==="blue")document.body.style.background="#0a1a3a";
if(t==="red")document.body.style.background="#3a0a0a";
}

/* PIN SYSTEM */
let pinned=JSON.parse(localStorage.getItem("pinned"))||{};
let current=null;

function showPinMenu(e,el){
current=el.dataset.app;
let m=document.getElementById("pinMenu");
m.style.display="block";
m.style.left=e.pageX+"px";
m.style.top=e.pageY+"px";
}

function confirmPin(val){
if(!current)return;
pinned[current]=val;
localStorage.setItem("pinned",JSON.stringify(pinned));
updatePins();
document.getElementById("pinMenu").style.display="none";
}

function togglePin(e,app){
e.stopPropagation();
pinned[app]=!pinned[app];
localStorage.setItem("pinned",JSON.stringify(pinned));
updatePins();
}

function updatePins(){
document.querySelectorAll(".icon").forEach(i=>{
let app=i.dataset.app;
let dot=i.querySelector(".pin-dot");
if(dot) dot.style.display=pinned[app]?"block":"none";
});
}

/* CLOSE PIN MENU */
document.addEventListener("click",()=>{
document.getElementById("pinMenu").style.display="none";
});

/* Z INDEX FIX */
let zIndex=10;

</script>

</body>
</html>
