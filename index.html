<!DOCTYPE html>
<html>
<head>
<title>History Project OS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

/* DESKTOP */
#desktop{
height:100vh;
padding:10px;
}

/* ICONS */
.icon{
width:100px;
padding:10px;
background:#222;
margin:5px;
display:inline-block;
cursor:pointer;
border-radius:5px;
text-align:center;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:40px;
background:#000;
display:flex;
align-items:center;
gap:5px;
padding:5px;
}

/* WINDOWS */
.window{
position:absolute;
top:100px;
left:100px;
width:520px;
height:360px;
background:#222;
display:none;
border:1px solid #444;
resize:both;
overflow:hidden;
}

.header{
background:#333;
padding:5px;
cursor:grab;
user-select:none;
}

.close{
float:right;
color:red;
cursor:pointer;
}

/* GAME LIST */
.game{
padding:5px;
cursor:pointer;
}
.game:hover{background:#333}

/* IFRAME */
iframe{
width:100%;
height:250px;
border:none;
}

/* SETTINGS BUTTONS */
button{margin:3px;}

</style>
</head>

<body>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" onclick="openApp('browser')">🌐 Browser</div>
<div class="icon" onclick="openApp('games')">🎮 Games</div>
<div class="icon" onclick="openApp('settings')">⚙️ Settings</div>

</div>

<!-- TASKBAR -->
<div id="taskbar"></div>

<!-- BROWSER -->
<div class="window" id="browser">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Browser <span class="close" onclick="closeApp('browser')">X</span>
</div>

<input id="url" placeholder="https://..." style="width:70%">
<button onclick="go()">Go</button>

<iframe id="frame"></iframe>
</div>

<!-- GAMES -->
<div class="window" id="games">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Games <span class="close" onclick="closeApp('games')">X</span>
</div>

<div class="game" onclick="openGame('https://classic.minecraft.net')">Minecraft</div>
<div class="game" onclick="openGame('https://quickdraw.withgoogle.com')">Quick Draw</div>
<div class="game" onclick="openGame('https://tetris.com/play-tetris')">Tetris</div>

<hr>

<div class="game" onclick="openGame('https://sites.google.com/view/drive-u-7-home/home')">Unblocked Hub 1</div>
<div class="game" onclick="openGame('https://sites.google.com/view/classroom6x/')">Classroom 6x</div>
<div class="game" onclick="openGame('https://sites.google.com/view/unblocked-game76')">Game 76</div>

</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Settings <span class="close" onclick="closeApp('settings')">X</span>
</div>

<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('white')">Light</button>

</div>

<script>

/* WINDOW SYSTEM */
let z=10,drag=null,ox,oy;

function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.zIndex=++z;
addTask(id);
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

/* TASKBAR */
function addTask(id){
if([...taskbar.children].find(b=>b.textContent===id))return;
let b=document.createElement("button");
b.textContent=id;
b.onclick=()=>openApp(id);
taskbar.appendChild(b);
}

/* DRAG FIXED */
function dragStart(e,el){
drag=el;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
}

document.onmousemove=e=>{
if(drag){
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
}
};

document.onmouseup=()=>drag=null;

/* BROWSER */
function go(){
frame.src=url.value;
}

function openGame(url){
openApp("browser");
frame.src=url;
}

/* THEMES */
function theme(t){
document.body.style.background =
t==="dark"?"#111":
t==="blue"?"#0a1a3a":"#eee";

document.body.style.color=(t==="white")?"black":"white";
}

</script>

</body>
</html>
