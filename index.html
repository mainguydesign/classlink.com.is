<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini OS Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

/* DESKTOP */
#desktop{
display:none;
height:100vh;
padding:20px;
}

/* ICONS */
.icon{
width:90px;
text-align:center;
display:inline-block;
cursor:pointer;
margin:10px;
position:relative;
}

/* WINDOWS */
.window{
position:absolute;
width:420px;
background:#222;
border:1px solid #444;
display:none;
}

.window-header{
background:#333;
padding:6px;
cursor:move;
user-select:none;
}

.close{
float:right;
cursor:pointer;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:#1a1a1a;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
}

/* GAME LIST */
#gameList a{
display:block;
padding:5px;
color:lightblue;
text-decoration:none;
}

/* PIN DOT */
.pin-dot{
position:absolute;
top:5px;
right:5px;
width:10px;
height:10px;
border-radius:50%;
background:purple;
display:none;
cursor:pointer;
}

/* PIN MENU */
.pin-menu{
position:absolute;
background:#222;
border:1px solid #555;
padding:6px;
font-size:12px;
display:none;
z-index:9999;
}

.pin-btn{
margin:2px;
padding:3px 6px;
cursor:pointer;
background:#333;
border:none;
color:white;
}

/* GATE */
#gate{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
display:none;
}

.gateHalf{
position:absolute;
width:50%;
height:100%;
background:black;
}

.left{left:0;}
.right{right:0;}

.open .left{animation:left 1s forwards;}
.open .right{animation:right 1s forwards;}

@keyframes left{to{transform:translateX(-100%)}}
@keyframes right{to{transform:translateX(100%)}}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="pass" placeholder="password">
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" data-app="games" onclick="openApp('games')" onmouseenter="showPinMenu(event,this)">
🎮 Games
<div class="pin-dot" onclick="togglePin(event,'games')"></div>
</div>

<div class="icon" data-app="settings" onclick="openApp('settings')" onmouseenter="showPinMenu(event,this)">
⚙️ Settings
<div class="pin-dot" onclick="togglePin(event,'settings')"></div>
</div>

</div>

<!-- GAMES -->
<div class="window" id="games">
<div class="window-header" onmousedown="dragStart(event,this.parentElement)">
🎮 Game Hub <span class="close" onclick="closeApp('games')">X</span>
</div>

<div style="padding:10px;">
<input id="search" placeholder="search" style="width:100%">
<div id="gameList"></div>
</div>
</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<div class="window-header" onmousedown="dragStart(event,this.parentElement)">
⚙️ Settings <span class="close" onclick="closeApp('settings')">X</span>
</div>

<div style="padding:10px;">
<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('red')">Red</button>
</div>
</div>

<!-- TASKBAR -->
<div id="taskbar">
<div>Start</div>
<div>Mini OS</div>
</div>

<!-- PIN MENU -->
<div id="pinMenu" class="pin-menu">
<div>Pin app?</div>
<button class="pin-btn" onclick="confirmPin(true)">Yes</button>
<button class="pin-btn" onclick="confirmPin(false)">No</button>
</div>

<!-- GATE -->
<div id="gate">
<div class="gateHalf left"></div>
<div class="gateHalf right"></div>
</div>

<script>

/* LOGIN */
document.getElementById("pass").addEventListener("keydown",e=>{
if(e.key==="Enter" && e.target.value==="superiorsiteowner"){
start();
}
});

function start(){
document.getElementById("login").style.display="none";
document.getElementById("desktop").style.display="block";

let g=document.getElementById("gate");
g.style.display="block";
setTimeout(()=>g.classList.add("open"),50);
setTimeout(()=>g.style.display="none",1000);

updatePins();
}

/* APPS */
function openApp(id){
document.getElementById(id).style.display="block";
}
function closeApp(id){
document.getElementById(id).style.display="none";
}

/* DRAG */
let drag=null,ox=0,oy=0;

function dragStart(e,el){
drag=el;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
}

document.addEventListener("mousemove",e=>{
if(drag){
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
}
});
document.addEventListener("mouseup",()=>drag=null);

/* GAME LIST */
const games=[
{name:"Minecraft",url:"#"},
{name:"Roblox",url:"#"},
{name:"Oregon Trail",url:"#"}
];

function render(){
let box=document.getElementById("gameList");
let s=document.getElementById("search").value.toLowerCase();
box.innerHTML="";

games.filter(g=>g.name.toLowerCase().includes(s))
.forEach(g=>{
let a=document.createElement("a");
a.href=g.url;
a.textContent=g.name;
box.appendChild(a);
});
}

document.addEventListener("input",e=>{
if(e.target.id==="search")render();
});
render();

/* THEMES */
function theme(t){
if(t==="dark")document.body.style.background="#111";
if(t==="blue")document.body.style.background="#0a1a3a";
if(t==="red")document.body.style.background="#3a0a0a";
}

/* PIN SYSTEM */
let pinned=JSON.parse(localStorage.getItem("pinned"))||{};
let current=null;

function showPinMenu(e,el){
current=el.dataset.app;
let m=document.getElementById("pinMenu");
m.style.display="block";
m.style.left=e.pageX+"px";
m.style.top=e.pageY+"px";
}

function confirmPin(val){
if(!current)return;
pinned[current]=val;
localStorage.setItem("pinned",JSON.stringify(pinned));
updatePins();
document.getElementById("pinMenu").style.display="none";
}

function togglePin(e,app){
e.stopPropagation();
pinned[app]=!pinned[app];
localStorage.setItem("pinned",JSON.stringify(pinned));
updatePins();
}

function updatePins(){
document.querySelectorAll(".icon").forEach(i=>{
let app=i.dataset.app;
let dot=i.querySelector(".pin-dot");
dot.style.display=pinned[app]?"block":"none";
});
}

document.addEventListener("click",()=>{
document.getElementById("pinMenu").style.display="none";
});

</script>

</body>
</html>
