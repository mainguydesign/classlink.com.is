<!DOCTYPE html>
<html>
<head>
<title>History Project</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
cursor:url("https://cdn-icons-png.flaticon.com/512/854/854878.png"),auto;
}

/* LOGIN */
#login,#locked{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}
#login{background:black;}
#locked{background:darkred;display:none;}

/* DESKTOP */
#desktop{display:none;height:100vh;padding:20px;}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:#000;
display:flex;
align-items:center;
padding:5px;
}

/* ICON */
.icon{
margin:10px;
cursor:pointer;
display:inline-block;
position:relative;
}

/* WINDOWS */
.window{
position:absolute;
top:100px;
left:100px;
width:500px;
height:350px;
background:#222;
display:none;
resize:both;
overflow:hidden;
border:1px solid #555;
}

.header{
background:#333;
padding:5px;
cursor:grab;
}

.close{
float:right;
cursor:pointer;
color:red;
}

/* BROWSER */
#browserBar{
background:#111;
padding:5px;
}
#url{
width:80%;
}

/* IFRAME */
iframe{
width:100%;
height:calc(100% - 60px);
border:none;
}

/* PIN */
.pin-dot{
width:10px;
height:10px;
background:purple;
position:absolute;
top:0;
right:0;
display:none;
}

#pinMenu{
position:absolute;
background:#222;
display:none;
padding:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="pass" placeholder="password">
<div id="msg"></div>
</div>

<!-- LOCK -->
<div id="locked">
<h2>ACCESS DENIED</h2>
<div id="timer"></div>
<input id="recovery" placeholder="recovery">
</div>

<!-- DESKTOP -->
<div id="desktop">

<div class="icon" data-app="browser" onclick="openApp('browser')" onmouseenter="hoverApp(event,this)">
🌐 Browser
<div class="pin-dot"></div>
</div>

<div class="icon" data-app="games" onclick="openApp('games')" onmouseenter="hoverApp(event,this)">
🎮 Games
<div class="pin-dot"></div>
</div>

<div class="icon" data-app="settings" onclick="openApp('settings')" onmouseenter="hoverApp(event,this)">
⚙️ Settings
<div class="pin-dot"></div>
</div>

</div>

<!-- TASKBAR -->
<div id="taskbar"></div>

<!-- BROWSER -->
<div class="window" id="browser">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Browser <span class="close" onclick="closeApp('browser')">X</span>
</div>

<div id="browserBar">
<input id="url" placeholder="enter url">
<button onclick="go()">Go</button>
</div>

<iframe id="web"></iframe>
</div>

<!-- GAMES -->
<div class="window" id="games">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Games <span class="close" onclick="closeApp('games')">X</span>
</div>

<div onclick="openGame('https://classic.minecraft.net')">Minecraft</div>
<div onclick="openGame('https://quickdraw.withgoogle.com')">Quick Draw</div>
<div onclick="openGame('https://www.roblox.com')">Roblox</div>
</div>

<!-- SETTINGS -->
<div class="window" id="settings">
<div class="header" onmousedown="dragStart(event,this.parentElement)">
Settings <span class="close" onclick="closeApp('settings')">X</span>
</div>

<button onclick="theme('dark')">Dark</button>
<button onclick="theme('blue')">Blue</button>
<button onclick="theme('red')">Red</button>
</div>

<!-- PIN MENU -->
<div id="pinMenu">
Pin app?<br>
<button onclick="pin(true)">Yes</button>
<button onclick="pin(false)">No</button>
</div>

<script>

/* PASSWORD */
const correct="superiorsiteowner";
const recoveryPass="superiorlakeemerald";
let attempts=0,lockUntil=0;

pass.onkeydown=e=>{
if(e.key==="Enter"){
if(Date.now()<lockUntil)return lock();

if(pass.value===correct){
login.style.display="none";
desktop.style.display="block";
}else{
attempts++;
msg.textContent="Wrong "+attempts;

if(attempts>=5){
lockUntil=Date.now()+600000;
lock();
}
}
pass.value="";
}
};

function lock(){
login.style.display="none";
locked.style.display="flex";

function t(){
let r=lockUntil-Date.now();
if(r>0){
timer.textContent=Math.ceil(r/1000)+"s";
setTimeout(t,1000);
}else{
locked.style.display="none";
login.style.display="flex";
attempts=0;
}
}
t();
}

recovery.onkeydown=e=>{
if(e.key==="Enter" && recovery.value===recoveryPass){
lockUntil=0;
locked.style.display="none";
login.style.display="flex";
}
};

/* WINDOWS */
let z=10;
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.zIndex=++z;
addTask(id);
}
function closeApp(id){
document.getElementById(id).style.display="none";
}

/* TASKBAR */
function addTask(id){
let btn=document.createElement("button");
btn.textContent=id;
btn.onclick=()=>openApp(id);
taskbar.appendChild(btn);
}

/* DRAG */
let drag=null,ox,oy;
function dragStart(e,el){
drag=el;
ox=e.clientX-el.offsetLeft;
oy=e.clientY-el.offsetTop;
}
document.onmousemove=e=>{
if(drag){
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
}
};
document.onmouseup=()=>drag=null;

/* BROWSER */
function go(){
let u=url.value;
if(!u.startsWith("http")) u="https://"+u;
web.src=u;
}

function openGame(u){
openApp("browser");
web.src=u;
}

/* THEMES */
function theme(t){
if(t==="dark")document.body.style.background="#111";
if(t==="blue")document.body.style.background="#0a1a3a";
if(t==="red")document.body.style.background="#3a0a0a";
}

/* PIN */
let lastHover={},current=null;
function hoverApp(e,el){
let app=el.dataset.app;
let now=Date.now();

if(lastHover[app] && now-lastHover[app]<10000)return;

current=app;
lastHover[app]=now;

pinMenu.style.display="block";
pinMenu.style.left=e.pageX+"px";
pinMenu.style.top=e.pageY+"px";

setTimeout(()=>pinMenu.style.display="none",2000);
}

function pin(v){
let dot=document.querySelector(`[data-app="${current}"] .pin-dot`);
dot.style.display=v?"block":"none";
pinMenu.style.display="none";
}

document.onclick=()=>pinMenu.style.display="none";

</script>

</body>
</html>
